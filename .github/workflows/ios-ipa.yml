name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: Export method for the IPA
        required: true
        default: app-store
        type: choice
        options:
          - app-store
          - ad-hoc
          - development
      build_name:
        description: Optional iOS build name override
        required: false
        type: string
      build_number:
        description: Optional iOS build number override
        required: false
        type: string
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      FLUTTER_CHANNEL: stable
      BUNDLE_ID: com.yanaworldwide.shop
      CERTIFICATE_PATH: ${{ runner.temp }}/build_certificate.p12
      PP_PATH: ${{ runner.temp }}/build_pp.mobileprovision
      KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
      EXPORT_OPTIONS_PATH: ${{ runner.temp }}/ExportOptions.plist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Set up Ruby for CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods dependencies
        shell: bash
        run: |
          cd ios
          pod repo update
          pod install

      - name: Validate signing secrets
        shell: bash
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          missing=0
          for secret_name in BUILD_CERTIFICATE_BASE64 BUILD_PROVISION_PROFILE_BASE64 P12_PASSWORD KEYCHAIN_PASSWORD APPLE_TEAM_ID PROVISIONING_PROFILE_NAME; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::$secret_name is not set"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare signing files
        shell: bash
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

      - name: Configure keychain and provisioning profile
        shell: bash
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles"

      - name: Create export options plist
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$EXPORT_OPTIONS_PATH" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ github.event.inputs.export_method || 'app-store' }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROVISIONING_PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Build signed IPA
        shell: bash
        run: |
          ARGS=(build ipa --release --export-options-plist="$EXPORT_OPTIONS_PATH")

          if [ -n "${{ github.event.inputs.build_name }}" ]; then
            ARGS+=("--build-name=${{ github.event.inputs.build_name }}")
          fi

          if [ -n "${{ github.event.inputs.build_number }}" ]; then
            ARGS+=("--build-number=${{ github.event.inputs.build_number }}")
          fi

          flutter "${ARGS[@]}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Upload XCArchive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: build/ios/archive/*.xcarchive
          if-no-files-found: warn
