<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Yana Moto Accessories logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#1D2A44"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FFC046"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <circle cx="512" cy="512" r="382" fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="18"/>
  <circle cx="512" cy="512" r="338" fill="none" stroke="url(#accent)" stroke-width="20"/>

  <g filter="url(#softShadow)">
    <circle cx="366" cy="596" r="84" fill="none" stroke="#FFFFFF" stroke-width="22"/>
    <circle cx="658" cy="596" r="84" fill="none" stroke="#FFFFFF" stroke-width="22"/>

    <path d="M 314 596 L 420 596 L 500 482 L 610 482 L 666 566"
          fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M 462 482 L 412 420 L 468 420"
          fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M 606 482 L 684 426"
          fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>

    <path d="M 468 420 L 700 420"
          fill="none" stroke="#FFFFFF" stroke-opacity="0.92" stroke-width="16" stroke-linecap="round"/>

    <path d="M 700 420 L 742 390"
          fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round"/>
  </g>

  <text x="512" y="760" text-anchor="middle" fill="#FFFFFF"
        font-family="Segoe UI, Arial, sans-serif" font-size="116" font-weight="800" letter-spacing="8">YANA</text>
  <text x="512" y="826" text-anchor="middle" fill="#FFC046"
        font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="7">MOTO ACCESSORIES</text>
</svg>
